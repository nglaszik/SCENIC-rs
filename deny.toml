# cargo-deny config. Run locally with `cargo deny check`; CI runs it on every PR.
#
# Why this matters here: scenic-rs is GPL-3.0-or-later (see NOTICE). A GPL-3.0
# work may only link dependencies under GPL-compatible licenses. The allow-list
# below is the set actually present in the tree today (all permissive), so any
# new dependency carrying an incompatible/copyleft license fails CI instead of
# silently shipping a license violation.

[advisories]
version = 2
yanked = "deny"
# RUSTSEC advisories are fetched fresh; an empty ignore list means none are
# silenced. Add IDs here (with a comment + justification) only when triaged.
ignore = []

[licenses]
version = 2
confidence-threshold = 0.9
# Resolved from `cargo metadata` -- every entry below is permissive and
# GPL-3.0-compatible. For SPDX "A OR B" expressions cargo-deny accepts the dep
# as long as one listed license matches.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
    "GPL-3.0-or-later",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
