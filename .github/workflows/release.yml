name: build & publish wheels

# Build abi3 wheels (one per platform, Python >=3.9) + sdist.
# - tag push  vX.Y.Z  -> build, then publish to PyPI
# - manual run         -> build only (test the matrix without releasing)
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wheels:
    name: wheel ${{ matrix.os }}-${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-22.04,   os: linux,   target: x86_64,  manylinux: auto }
          - { runner: ubuntu-22.04,   os: linux,   target: aarch64, manylinux: auto }
          - { runner: macos-13,       os: macos,   target: x86_64 }
          - { runner: macos-14,       os: macos,   target: aarch64 }
          - { runner: windows-latest, os: windows, target: x64 }
    steps:
      - uses: actions/checkout@v4
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: ${{ matrix.manylinux }}
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist

  sdist:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  publish:
    name: publish to PyPI
    needs: [wheels, sdist]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    environment: pypi
    permissions:
      id-token: write   # PyPI Trusted Publishing (OIDC) — no API token/secret needed
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
